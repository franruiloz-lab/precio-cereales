name: Actualizar Precios de Cereales

on:
  schedule:
    # 12:00 hora España (11:00 UTC)
    - cron: '0 11 * * *'
    # 16:00 hora España (15:00 UTC)
    - cron: '0 15 * * *'
    # 20:00 hora España (19:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub

permissions:
  contents: write  # Necesario para hacer push
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependencias Python
        run: pip install -r scripts/requirements.txt

      - name: Ejecutar script de actualización
        working-directory: scripts
        run: python actualizar_precios.py

      - name: Comprobar si hay cambios
        id: check_changes
        run: |
          git diff --quiet src/data/precios/ src/data/ultima-actualizacion.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit y push si hay datos nuevos
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/precios/ src/data/ultima-actualizacion.json
          git commit -m "Actualizar precios de cereales $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: actualizar
    if: needs.actualizar.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # Asegura que coge el commit recién hecho

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias Node
        run: npm ci

      - name: Build con Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
